services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    environment:
      DATABASE_URL: postgresql://factory:factory@db:5432/factorydb
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-changeme}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-changeme}
      RESEND_API_KEY: ${RESEND_API_KEY:-changeme}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@clarityapp.com}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    cap_add:
      - NET_ADMIN

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factorydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factorydb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
